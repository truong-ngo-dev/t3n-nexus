<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tạo mật khẩu — T3E Nexus</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --primary:     #0D0D0D;
            --on-primary:  #FFFFFF;
            --surface:     #FFFFFF;
            --surface-var: #F8F9FA;
            --outline:     #E0E0E0;
            --muted:       #757575;
            --error:       #D32F2F;
            --r-button:    24px;
            --r-card:      8px;
            --r-input:     4px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--surface-var);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--outline);
            border-radius: var(--r-card);
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
        }

        .brand {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin: 0 0 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            margin: 0 0 32px;
        }

        .alert {
            font-size: 14px;
            color: var(--error);
            background: #FFF5F5;
            border: 1px solid #FFCDD2;
            border-radius: var(--r-input);
            padding: 12px 14px;
            margin-bottom: 20px;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 6px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--outline);
            border-radius: var(--r-input);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--primary);
            background: var(--surface);
            outline: none;
            transition: border-color .15s;
        }

        input::placeholder { color: var(--muted); }
        input:focus { border-color: var(--primary); }

        .btn-primary {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: var(--r-button);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s;
        }

        .btn-primary:hover { opacity: 0.82; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="brand">T3E Nexus</h1>
    <p class="subtitle">Tạo mật khẩu cho tài khoản của bạn</p>

    <div class="alert" th:if="${error == 'mismatch'}">Mật khẩu xác nhận không khớp.</div>
    <div class="alert" th:if="${error == 'too_short'}">Mật khẩu phải có ít nhất 8 ký tự.</div>
    <div class="alert" th:if="${error == 'invalid'}">Link đã hết hạn hoặc đã được sử dụng. Vui lòng yêu cầu gửi lại.</div>

    <form th:action="@{/password/setup}" method="post">
        <input type="hidden" name="token" th:value="${token}"/>

        <div class="field">
            <label for="password">Mật khẩu mới</label>
            <input type="password" id="password" name="password"
                   placeholder="Tối thiểu 8 ký tự"
                   autocomplete="new-password" autofocus required/>
        </div>
        <div class="field">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" name="confirmPassword"
                   placeholder="Nhập lại mật khẩu"
                   autocomplete="new-password" required/>
        </div>

        <button type="submit" class="btn-primary">Xác nhận</button>
    </form>
</div>
</body>
</html>
