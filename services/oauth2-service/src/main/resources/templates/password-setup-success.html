<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mật khẩu đã được tạo — T3E Nexus</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --primary:     #0D0D0D;
            --on-primary:  #FFFFFF;
            --surface:     #FFFFFF;
            --surface-var: #F8F9FA;
            --outline:     #E0E0E0;
            --muted:       #757575;
            --success:     #2E7D32;
            --r-button:    24px;
            --r-card:      8px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--surface-var);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--outline);
            border-radius: var(--r-card);
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .brand {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin: 0 0 32px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin: 0 0 8px;
        }

        p {
            font-size: 14px;
            color: var(--muted);
            margin: 0 0 32px;
            line-height: 1.6;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 32px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: var(--r-button);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .15s;
        }

        .btn-primary:hover { opacity: 0.82; }
    </style>
</head>
<body>
<div class="card">
    <h1 class="brand">T3E Nexus</h1>
    <div class="icon">&#10003;</div>
    <h2>Mật khẩu đã được tạo</h2>
    <p>Bạn có thể đăng nhập bằng email và mật khẩu vừa tạo.</p>
    <a th:href="${frontendUrl}" class="btn-primary">Đăng nhập ngay</a>
</div>
</body>
</html>
