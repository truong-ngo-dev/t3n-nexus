<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xác thực OTP — T3Nexus</title>
    <link rel="icon" href="data:,">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 6px; color: #0f172a; }
        .subtitle { color: #64748b; font-size: 0.875rem; margin: 0 0 28px; line-height: 1.5; }
        .error {
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 0.875rem;
        }
        label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 6px; }
        input[name="token"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1.5rem;
            letter-spacing: 0.4em;
            text-align: center;
            outline: none;
            transition: border-color .15s;
        }
        input[name="token"]:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
        button[type="submit"] {
            width: 100%;
            margin-top: 16px;
            padding: 11px;
            background: #1d4ed8;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s;
        }
        button[type="submit"]:hover { background: #1e40af; }
        .resend { margin-top: 20px; text-align: center; font-size: 0.825rem; color: #64748b; }
        .resend a { color: #2563eb; text-decoration: none; }
        .resend a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>Xác thực hai yếu tố</h1>
    <p class="subtitle">
        Mã OTP 6 chữ số đã được gửi đến <strong th:text="${maskedEmail}">email</strong>.
        Mã có hiệu lực trong 5 phút.
    </p>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login/ott}" method="post">
        <label for="token">Nhập mã OTP</label>
        <input type="text"
               id="token"
               name="token"
               maxlength="6"
               inputmode="numeric"
               pattern="\d{6}"
               autocomplete="one-time-code"
               placeholder="000000"
               autofocus
               required/>
        <button type="submit">Xác nhận</button>
    </form>

    <p class="resend">
        Không nhận được mã? <a th:href="@{/mfa}">Gửi lại OTP</a>
    </p>
</div>
</body>
</html>
