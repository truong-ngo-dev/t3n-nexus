spring.application.name=oauth2-service
server.port=8004

spring.datasource.url=jdbc:postgresql://localhost:5435/oauth2_db
spring.datasource.username=${DB_USERNAME:t3nexus}
spring.datasource.password=${DB_PASSWORD:t3nexus}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

app.kafka.consumer-group=oauth2-service
app.kafka.topic.session-revoked=oauth2.session.revoked

app.webgateway.base-url=http://localhost:8090

management.tracing.sampling.probability=1.0
logging.level.io.micrometer.tracing=DEBUG
logging.level.org.springframework.boot.actuate.autoconfigure.tracing=DEBUG

# --- DEBUG ---
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.security.web.authentication=TRACE
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

# Security
server.servlet.session.timeout=86400s
spring.session.cookie.name=OAUTH2_SESSION
spring.security.oauth2.authorizationserver.issuer=http://localhost:8004
app.cors.allowed-origins=http://localhost:4200

# JWT Key encryption
jwt.key.id=${JWT_KEY_ID:t3n-nexus-oauth2-key}
jwt.persistence.password=${JWT_PERSISTENCE_PASSWORD:changeme-secret-password-32chars!!}
jwt.persistence.salt=${JWT_PERSISTENCE_SALT:deadbeef12345678}

# Google OAuth2 (social login)
client.google.client_id=${GOOGLE_CLIENT_ID:443094009014-4chs11j77td3u8kgta32i74djqv0525i.apps.googleusercontent.com}
client.google.secret=${GOOGLE_CLIENT_SECRET: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}

spring.security.oauth2.client.registration.google.provider=google
spring.security.oauth2.client.registration.google.client-id=${client.google.client_id}
spring.security.oauth2.client.registration.google.client-secret=${client.google.secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=email
