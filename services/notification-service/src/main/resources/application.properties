spring.application.name=notification-service
server.port=8003

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/notification_db
spring.datasource.username=${DB_USERNAME:t3nexus}
spring.datasource.password=${DB_PASSWORD:t3nexus}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
app.kafka.topic.password-setup-requested=identity.password-setup.requested
app.kafka.topic.password-setup-resent=oauth2.credential.password-setup-resent
app.kafka.topic.login-otp-requested=oauth2.login-otp.requested
app.kafka.topic.device-trust-otp-requested=identity.device-trust-otp.requested
app.kafka.topic.email-verification-requested=identity.email-verification.requested
app.kafka.topic.email-verification-reissued=identity.email-verification.reissued
app.kafka.topic.email-verification-verified=identity.email-verification.verified
app.kafka.topic.dlq=notification-service.dlq
app.kafka.consumer-group=notification-service
app.oauth2.url=${OAUTH2_URL:http://localhost:8004}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Observability
management.tracing.sampling.probability=1.0
logging.level.io.micrometer.tracing=DEBUG
logging.level.org.springframework.boot.actuate.autoconfigure.tracing=DEBUG
logging.level.vn.t3nexus.notification=DEBUG

