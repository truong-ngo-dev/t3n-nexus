spring.application.name=email-worker

# Pure Kafka consumer no inbound HTTP port.
# Micrometer tracing pushes spans outbound to Zipkin/Jaeger; no web server needed.
# Switch to servlet + add server.port if Prometheus pull scraping is required later.
spring.main.web-application-type=none

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
app.kafka.topic.email-transactional=notification.email.transactional
app.kafka.topic.email-bulk=notification.email.bulk
app.kafka.topic.dlq=email-worker.dlq
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka consumer group IDs (must be distinct independent lag tracking and alerting)
app.kafka.consumer-group.tier1=email-worker-t1
app.kafka.consumer-group.tier2=email-worker-t2

# Kafka concurrency per tier
# Tier 1: 3 threads max volume bounded by user action rate, higher concurrency risks SES rate limit hits
# Tier 2: 1 thread bottleneck is SES 14 msg/s, not consumer throughput; rate limiter is the real knob
app.kafka.concurrency.tier1=3
app.kafka.concurrency.tier2=1

# Spring Mail Mailhog (dev), override via env vars in production
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=${MAIL_FROM:noreply@t3nexus.vn}

# Redis shared with idempotency-support and (future) rate-limiter-starter
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Idempotency Redis key TTL must exceed max Kafka redelivery window
# Pattern: "email:{notification_log_id}"
app.idempotency.ttl-hours=72

# Rate limiter (Tier 2) SES production default 14 msg/s
# Enforced via Redis sliding window shared across all email-worker instances
app.rate-limiter.email.bulk.rate-per-second=14

# App base URL injected into email links (e.g., verification link)
app.base-url=${APP_BASE_URL:http://localhost:8001}

# Observability
management.tracing.sampling.probability=1.0
logging.level.io.micrometer.tracing=DEBUG

# Spring Boot 4.x: ConfigurationPropertiesReportEndpoint hardcodes com.fasterxml.jackson.datatype.jsr310.JavaTimeModule
# (Jackson 2.x) which no longer exists in Jackson 3.x - exclude the autoconfiguration entirely
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.context.properties.ConfigurationPropertiesReportEndpointAutoConfiguration
