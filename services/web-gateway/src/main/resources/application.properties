spring.application.name=web-gateway

spring.cloud.discovery.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OAuth2 Client
spring.security.oauth2.client.registration.web-gateway.provider=web-gateway
spring.security.oauth2.client.registration.web-gateway.client-id=${WEB_GATEWAY_CLIENT_ID:web-gateway}
spring.security.oauth2.client.registration.web-gateway.client-secret=${WEB_GATEWAY_CLIENT_SECRET:secret}
spring.security.oauth2.client.registration.web-gateway.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.web-gateway.redirect-uri={baseUrl}/login/oauth2/code/web-gateway
spring.security.oauth2.client.registration.web-gateway.scope=openid,profile,email

# Explicit endpoints - avoids startup-time OIDC discovery fetch against oauth2-service
spring.security.oauth2.client.provider.web-gateway.authorization-uri=http://localhost:8004/oauth2/authorize
spring.security.oauth2.client.provider.web-gateway.token-uri=http://localhost:8004/oauth2/token
spring.security.oauth2.client.provider.web-gateway.jwk-set-uri=http://localhost:8004/oauth2/jwks
spring.security.oauth2.client.provider.web-gateway.user-info-uri=http://localhost:8004/userinfo
spring.security.oauth2.client.provider.web-gateway.user-name-attribute=sub

# Resource server — validates service-account tokens on /webgw/internal/** (switch from permitAll after testing)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8004/oauth2/jwks

# Server
server.port=8090

# CORS
app.cors.allowed-origins=http://localhost:4200

# Post-login redirect - browser lands here after OAuth2 callback processed (Angular SPA)
app.login.success-redirect-uri=http://localhost:4200/customer

# Post-logout redirect - browser lands here after OIDC end_session
app.logout.post-redirect-uri=http://localhost:4200
# OIDC end_session endpoint - not discoverable when issuer-uri is absent
app.logout.end-session-uri=http://localhost:8004/connect/logout

# Backend service URIs
webgateway.routes.oauth2-service.uri=http://localhost:8004
webgateway.routes.identity-service.uri=http://localhost:8001
webgateway.routes.customer-service.uri=http://localhost:8002

# Redis mapping TTL — should match refresh token validity on oauth2-service
app.session.mapping-ttl-seconds=86400
spring.session.timeout=86400s

# Security debug logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
