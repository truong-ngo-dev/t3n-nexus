<div class="profile-container">
  <!-- Breadcrumb / Header -->
  <nav class="profile-breadcrumb">
    <span class="parent-label">{{ parentTitle() }}</span>
    <mat-icon>chevron_right</mat-icon>
    <span class="active-label">{{ pageTitle() }}</span>
  </nav>

  <div class="profile-content">
    @if (activeTab() === 0) {
      @switch (activeSubTab()) {
        @case (0) { <app-personal-info-tab /> }
        @case (1) { <app-change-password /> }
        @case (2) {
          <mat-card appearance="outlined" class="placeholder-card">
            <mat-card-content>Đang phát triển</mat-card-content>
          </mat-card>
        }
      }
    } @else {
      <app-security-tab [initialSubTab]="activeSubTab()" />
    }
  </div>
</div>
